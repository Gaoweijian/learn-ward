<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富文本编辑器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg-start: #667eea;
            --bg-end: #764ba2;
            --card-bg: #ffffff;
            --text-primary: #333;
            --text-secondary: #666;
            --text-light: #999;
            --border: #e0e0e0;
            --accent: #667eea;
            --bg-secondary: #f5f5f5;
            --bg-input: #ffffff;
            --shadow-color: rgba(0,0,0,0.08);
            --overlay-bg: rgba(0,0,0,0.5);
            --modal-bg: #ffffff;
            --header-bg: rgba(255,255,255,0.95);
        }

        [data-theme="dark"] {
            --card-bg: #252540;
            --text-primary: #e8e8e8;
            --text-secondary: #b0b0b0;
            --text-light: #707070;
            --border: #404060;
            --bg-secondary: #1e1e32;
            --bg-input: #2a2a40;
            --shadow-color: rgba(0,0,0,0.4);
            --overlay-bg: rgba(0,0,0,0.7);
            --modal-bg: #252540;
            --header-bg: rgba(30,30,50,0.95);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* 头部导航 */
        .header {
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 20px var(--shadow-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .header-left i {
            font-size: 28px;
            color: var(--accent);
        }
        .header-left h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .search-box {
            position: relative;
        }
        .search-box input {
            padding: 10px 16px 10px 38px;
            border: 2px solid var(--border);
            border-radius: 25px;
            font-size: 14px;
            width: 260px;
            outline: none;
            transition: border-color 0.3s;
        }
        .search-box input:focus {
            border-color: var(--accent);
        }
        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }
        .btn {
            padding: 10px 22px;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
            color: #fff;
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.5);
        }
        .btn-back {
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 10px 16px;
        }
        .btn-back:hover {
            background: var(--border);
        }

        /* 主容器 */
        .container {
            max-width: 1100px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* 文章卡片列表 */
        .article-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .article-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 20px var(--shadow-color);
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }
        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.14);
        }
        .article-info {
            flex: 1;
            min-width: 0;
        }
        .article-info h3 {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .article-preview {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 10px;
        }
        .article-meta {
            font-size: 12px;
            color: var(--text-light);
            display: flex;
            gap: 16px;
        }
        .article-actions {
            display: flex;
            gap: 8px;
            flex-shrink: 0;
            margin-left: 16px;
        }
        .action-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s;
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }
        .action-icon:hover {
            transform: scale(1.1);
        }
        .action-icon.view { color: #06D6A0; }
        .action-icon.view:hover { background: #e6faf3; }
        .action-icon.edit { color: #667eea; }
        .action-icon.edit:hover { background: #eef1ff; }
        .action-icon.delete { color: #EF476F; }
        .action-icon.delete:hover { background: #fde8ec; }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-top: 30px;
        }
        .pagination button {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: none;
            background: var(--card-bg);
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
            box-shadow: 0 2px 8px var(--shadow-color);
        }
        .pagination button:hover:not(:disabled) {
            background: var(--accent);
            color: white;
        }
        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .pagination span {
            font-size: 14px;
            color: white;
            font-weight: 600;
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: white;
        }
        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.8;
        }
        .empty-state h3 {
            font-size: 20px;
            margin-bottom: 8px;
        }
        .empty-state p {
            font-size: 14px;
            opacity: 0.8;
        }

        /* 弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--overlay-bg);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: var(--modal-bg);
            border-radius: 16px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal-header {
            padding: 20px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .modal-header h2 {
            font-size: 20px;
            font-weight: 700;
        }
        .modal-close {
            width: 36px; height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg-secondary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }
        .modal-close:hover {
            background: var(--border);
        }
        .modal-body {
            padding: 24px 28px;
            overflow-y: auto;
            flex: 1;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 6px;
            color: var(--text-primary);
        }
        .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
            background: var(--bg-input);
            color: var(--text-primary);
        }
        .form-group input:focus {
            border-color: var(--accent);
        }
        .editor-container {
            border: 2px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.3s;
        }
        .editor-container:focus-within {
            border-color: var(--accent);
        }
        .editor-container .ql-toolbar {
            border: none;
            border-bottom: 1px solid var(--border);
        }
        .editor-container .ql-container {
            border: none;
            min-height: 300px;
            font-size: 15px;
        }
        .ql-editor {
            min-height: 300px;
            line-height: 1.8;
        }
        .modal-footer {
            padding: 16px 28px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }
        .btn-cancel {
            background: var(--bg-secondary);
            color: var(--text-primary);
        }
        .btn-cancel:hover { background: var(--border); }
        .btn-danger {
            background: #EF476F;
            color: white;
        }
        .btn-danger:hover {
            background: #d63d5f;
        }

        /* 查看弹窗 */
        .view-content {
            line-height: 1.8;
            color: var(--text-primary);
        }
        .view-content img {
            max-width: 100%;
            height: auto;
        }
        .view-content h1, .view-content h2, .view-content h3 {
            margin: 10px 0;
        }
        .view-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: var(--text-light);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
                flex-wrap: wrap;
                gap: 12px;
            }
            .header-right {
                width: 100%;
            }
            .search-box { flex: 1; }
            .search-box input { width: 100%; }
            .article-card {
                flex-direction: column;
            }
            .article-actions {
                margin-left: 0;
                margin-top: 12px;
                justify-content: flex-end;
            }
            .container {
                padding: 0 12px;
            }
        }

        /* toast */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 600;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
        .toast.success { background: #06D6A0; }
        .toast.error { background: #EF476F; }

        /* loading */
        .loading {
            text-align: center;
            padding: 60px 0;
            color: white;
        }
        .loading i {
            font-size: 32px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 深色模式切换按钮 */
        .theme-toggle {
            width: 40px; height: 40px;
            background: var(--bg-secondary);
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary);
            flex-shrink: 0;
        }
        .theme-toggle:hover {
            background: var(--border);
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="header">
    <div class="header-left">
        <a href="/" class="btn btn-back"><i class="fas fa-home"></i></a>
        <i class="fas fa-feather-alt"></i>
        <h1>富文本编辑器</h1>
    </div>
    <div class="header-right">
        <button class="theme-toggle" id="themeToggle" title="切换深色模式">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="搜索文章标题或内容..." onkeyup="handleSearch()">
        </div>
        <button class="btn btn-primary" onclick="openCreateModal()">
            <i class="fas fa-plus"></i> 新建文章
        </button>
    </div>
</div>

<div class="container" id="appContainer">
    <!-- 动态渲染 -->
</div>

<!-- 创建/编辑弹窗 -->
<div class="modal-overlay" id="editorModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="editorModalTitle">新建文章</h2>
            <button class="modal-close" onclick="closeEditorModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label>文章标题</label>
                <input type="text" id="articleTitle" placeholder="请输入文章标题">
            </div>
            <div class="form-group">
                <label>内容</label>
                <div class="editor-container">
                    <div id="editor"></div>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-cancel" onclick="closeEditorModal()">取消</button>
            <button class="btn btn-primary" id="saveBtn" onclick="saveArticle()">
                <i class="fas fa-save"></i> 保存
            </button>
        </div>
    </div>
</div>

<!-- 查看弹窗 -->
<div class="modal-overlay" id="viewModal">
    <div class="modal">
        <div class="modal-header">
            <h2 id="viewTitle"></h2>
            <button class="modal-close" onclick="closeViewModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body">
            <div class="view-meta" id="viewMeta"></div>
            <div class="view-content" id="viewContent"></div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-cancel" onclick="closeViewModal()">关闭</button>
            <button class="btn btn-primary" id="viewEditBtn" onclick="editFromView()">
                <i class="fas fa-edit"></i> 编辑
            </button>
        </div>
    </div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal" style="max-width: 440px;">
        <div class="modal-header">
            <h2>确认删除</h2>
            <button class="modal-close" onclick="closeDeleteModal()">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div class="modal-body" style="text-align:center; padding: 32px 28px;">
            <i class="fas fa-exclamation-triangle" style="font-size:48px; color:#EF476F; margin-bottom:16px;"></i>
            <p style="font-size:16px; color:#666;">确定要删除这篇文章吗？</p>
            <p style="font-size:14px; color:#999; margin-top:6px;" id="deleteTitle"></p>
            <p style="font-size:12px; color:#EF476F; margin-top:10px;">此操作不可恢复</p>
        </div>
        <div class="modal-footer">
            <button class="btn btn-cancel" onclick="closeDeleteModal()">取消</button>
            <button class="btn btn-danger" id="confirmDeleteBtn" onclick="confirmDelete()">
                <i class="fas fa-trash"></i> 确认删除
            </button>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>
<script>
    const API_BASE = '/api/admin/richtext';
    let currentPage = 0;
    let totalPages = 1;
    let searchKeyword = '';
    let quillEditor = null;
    let currentArticleId = null;
    let deleteTargetId = null;
    let viewingArticleId = null;

    // ============ Quill 编辑器初始化 ============
    function initQuill() {
        if (quillEditor) return;
        quillEditor = new Quill('#editor', {
            theme: 'snow',
            placeholder: '在这里编写文章内容...',
            modules: {
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'color': [] }, { 'background': [] }],
                    [{ 'list': 'ordered' }, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['blockquote', 'code-block'],
                    ['link', 'image'],
                    ['clean']
                ]
            }
        });
    }

    // ============ 加载文章列表 ============
    async function loadArticles() {
        const container = document.getElementById('appContainer');
        container.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i></div>';

        try {
            const params = new URLSearchParams({ page: currentPage, size: 10 });
            if (searchKeyword) params.set('keyword', searchKeyword);

            const resp = await fetch(`${API_BASE}?${params}`);
            const data = await resp.json();
            const articles = data.content;
            totalPages = data.totalPages;

            if (articles.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-file-alt"></i>
                        <h3>还没有文章</h3>
                        <p>点击上方按钮创建第一篇文章吧</p>
                    </div>`;
                return;
            }

            let html = '<div class="article-list">';
            articles.forEach(a => {
                const created = a.createdAt ? new Date(a.createdAt).toLocaleString('zh-CN') : '-';
                const updated = a.updatedAt ? new Date(a.updatedAt).toLocaleString('zh-CN') : '-';
                const preview = a.content ? stripHtml(a.content).substring(0, 100) : '暂无内容';

                html += `
                    <div class="article-card">
                        <div class="article-info" onclick="openViewModal(${a.id})">
                            <h3>${escapeHtml(a.title)}</h3>
                            <div class="article-preview">${escapeHtml(preview)}</div>
                            <div class="article-meta">
                                <span><i class="far fa-calendar-plus"></i> 创建: ${created}</span>
                                <span><i class="far fa-edit"></i> 更新: ${updated}</span>
                            </div>
                        </div>
                        <div class="article-actions">
                            <button class="action-icon view" title="查看" onclick="event.stopPropagation();openViewModal(${a.id})">
                                <i class="fas fa-eye"></i>
                            </button>
                            <button class="action-icon edit" title="编辑" onclick="event.stopPropagation();openEditModal(${a.id})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="action-icon delete" title="删除" onclick="event.stopPropagation();openDeleteModal(${a.id}, '${escapeHtml(a.title).replace(/'/g, "\\'")}')">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>`;
            });
            html += '</div>';

            // 分页
            if (totalPages > 1) {
                html += `
                    <div class="pagination">
                        <button ${currentPage <= 0 ? 'disabled' : ''} onclick="goPage(${currentPage - 1})">
                            <i class="fas fa-chevron-left"></i>
                        </button>
                        <span>${currentPage + 1} / ${totalPages}</span>
                        <button ${currentPage >= totalPages - 1 ? 'disabled' : ''} onclick="goPage(${currentPage + 1})">
                            <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>`;
            }

            container.innerHTML = html;
        } catch (err) {
            console.error('加载文章失败:', err);
            container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>加载失败</h3><p>请检查网络连接</p></div>';
        }
    }

    // ============ 搜索 ============
    function handleSearch() {
        searchKeyword = document.getElementById('searchInput').value.trim();
        currentPage = 0;
        loadArticles();
    }

    function goPage(page) {
        currentPage = page;
        loadArticles();
    }

    // ============ 创建 ============
    function openCreateModal() {
        currentArticleId = null;
        document.getElementById('editorModalTitle').textContent = '新建文章';
        document.getElementById('articleTitle').value = '';
        initQuill();
        quillEditor.setContents([]);
        document.getElementById('editorModal').classList.add('active');
    }

    // ============ 编辑 ============
    async function openEditModal(id) {
        try {
            const resp = await fetch(`${API_BASE}/${id}`);
            if (!resp.ok) throw new Error('Not found');
            const article = await resp.json();

            currentArticleId = article.id;
            document.getElementById('editorModalTitle').textContent = '编辑文章';
            document.getElementById('articleTitle').value = article.title;
            initQuill();
            quillEditor.root.innerHTML = article.content || '';
            document.getElementById('editorModal').classList.add('active');
        } catch (err) {
            showToast('加载文章失败', 'error');
        }
    }

    function closeEditorModal() {
        document.getElementById('editorModal').classList.remove('active');
        currentArticleId = null;
    }

    async function saveArticle() {
        const title = document.getElementById('articleTitle').value.trim();
        if (!title) {
            showToast('请输入文章标题', 'error');
            return;
        }
        const content = quillEditor.root.innerHTML;

        try {
            if (currentArticleId) {
                await fetch(`${API_BASE}/${currentArticleId}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });
                showToast('更新成功', 'success');
            } else {
                await fetch(API_BASE, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, content })
                });
                showToast('创建成功', 'success');
            }
            closeEditorModal();
            loadArticles();
        } catch (err) {
            showToast('保存失败', 'error');
        }
    }

    // ============ 查看 ============
    async function openViewModal(id) {
        viewingArticleId = id;
        try {
            const resp = await fetch(`${API_BASE}/${id}`);
            if (!resp.ok) throw new Error('Not found');
            const article = await resp.json();

            document.getElementById('viewTitle').textContent = article.title;
            const created = article.createdAt ? new Date(article.createdAt).toLocaleString('zh-CN') : '-';
            const updated = article.updatedAt ? new Date(article.updatedAt).toLocaleString('zh-CN') : '-';
            document.getElementById('viewMeta').innerHTML = `
                <span><i class="far fa-calendar-plus"></i> 创建: ${created}</span>
                <span><i class="far fa-edit"></i> 更新: ${updated}</span>`;
            document.getElementById('viewContent').innerHTML = article.content || '暂无内容';
            document.getElementById('viewEditBtn').onclick = () => { closeViewModal(); openEditModal(id); };
            document.getElementById('viewModal').classList.add('active');
        } catch (err) {
            showToast('加载文章详情失败', 'error');
        }
    }

    function closeViewModal() {
        document.getElementById('viewModal').classList.remove('active');
        viewingArticleId = null;
    }

    function editFromView() {
        if (viewingArticleId) {
            closeViewModal();
            openEditModal(viewingArticleId);
        }
    }

    // ============ 删除 ============
    function openDeleteModal(id, title) {
        deleteTargetId = id;
        document.getElementById('deleteTitle').textContent = '「' + title + '」';
        document.getElementById('deleteModal').classList.add('active');
    }

    function closeDeleteModal() {
        document.getElementById('deleteModal').classList.remove('active');
        deleteTargetId = null;
    }

    async function confirmDelete() {
        if (!deleteTargetId) return;
        try {
            await fetch(`${API_BASE}/${deleteTargetId}`, { method: 'DELETE' });
            showToast('删除成功', 'success');
            closeDeleteModal();
            loadArticles();
        } catch (err) {
            showToast('删除失败', 'error');
        }
    }

    // ============ 辅助 ============
    function stripHtml(html) {
        const tmp = document.createElement('div');
        tmp.innerHTML = html;
        return tmp.textContent || tmp.innerText || '';
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    function showToast(msg, type) {
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast ' + type + ' show';
        clearTimeout(toast._timer);
        toast._timer = setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 点击遮罩关闭弹窗
    document.getElementById('editorModal').addEventListener('click', function(e) {
        if (e.target === this) closeEditorModal();
    });
    document.getElementById('viewModal').addEventListener('click', function(e) {
        if (e.target === this) closeViewModal();
    });
    document.getElementById('deleteModal').addEventListener('click', function(e) {
        if (e.target === this) closeDeleteModal();
    });

    // Esc 关闭弹窗
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            closeEditorModal();
            closeViewModal();
            closeDeleteModal();
        }
    });

    // 初始化
    initTheme();
    loadArticles();

    // ==================== 深色模式 ====================
    function initTheme() {
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        updateThemeIcon(savedTheme);
    }

    function toggleTheme() {
        const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
        const newTheme = currentTheme === 'light' ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', newTheme);
        localStorage.setItem('theme', newTheme);
        updateThemeIcon(newTheme);
        showToast(newTheme === 'dark' ? '已切换到深色模式' : '已切换到浅色模式', 'success');
    }

    function updateThemeIcon(theme) {
        const icon = document.getElementById('themeIcon');
        if (theme === 'dark') {
            icon.className = 'fas fa-sun';
        } else {
            icon.className = 'fas fa-moon';
        }
    }

    document.getElementById('themeToggle').addEventListener('click', toggleTheme);
</script>
</body>
</html>
