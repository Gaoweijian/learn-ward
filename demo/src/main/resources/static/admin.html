<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>学习管理系统 - 管理后台</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --success: #34D399;
            --danger: #F87171;
            --warning: #FBBF24;
            --bg: #f5f6fa;
            --bg-card: #ffffff;
            --bg-secondary: #f8f9fa;
            --bg-input: #ffffff;
            --text-primary: #333;
            --text-secondary: #666;
            --text-light: #999;
            --border-color: #e0e0e0;
            --shadow-color: rgba(0,0,0,0.1);
            --overlay-bg: rgba(0,0,0,0.5);
            --header-bg: #ffffff;
            --table-stripe: #f8f9fa;
            --modal-bg: #ffffff;
            --modal-input-bg: #f8f9fa;
        }

        [data-theme="dark"] {
            --bg: #1a1a2e;
            --bg-card: #252540;
            --bg-secondary: #1e1e32;
            --bg-input: #2a2a40;
            --text-primary: #e8e8e8;
            --text-secondary: #b0b0b0;
            --text-light: #707070;
            --border-color: #404060;
            --shadow-color: rgba(0,0,0,0.4);
            --overlay-bg: rgba(0,0,0,0.7);
            --header-bg: #1e1e32;
            --table-stripe: #2a2a40;
            --modal-bg: #252540;
            --modal-input-bg: #2a2a40;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* 顶部导航 */
        .header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            font-size: 28px;
        }

        .header-title {
            color: white;
            font-size: 22px;
            font-weight: bold;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-back {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-back:hover {
            background: rgba(255,255,255,0.3);
        }

        .btn-logout {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .btn-logout:hover {
            background: rgba(248,113,113,0.8);
        }

        /* 主内容 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        /* 统计卡片 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: 0 4px 15px var(--shadow-color);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
        }

        .stat-icon {
            width: 56px;
            height: 56px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .stat-info h3 {
            font-size: 28px;
            font-weight: bold;
            color: var(--text-primary);
        }

        .stat-info p {
            font-size: 14px;
            color: var(--text-light);
        }

        /* Tab 导航 */
        .tab-nav {
            background: var(--bg-card);
            border-radius: 16px 16px 0 0;
            display: flex;
            overflow-x: auto;
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        .tab-btn {
            padding: 16px 28px;
            border: none;
            background: none;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 3px solid transparent;
        }

        .tab-btn:hover {
            color: var(--primary);
            background: var(--bg-secondary);
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--bg-secondary);
        }

        /* 内容区 */
        .tab-content {
            background: var(--bg-card);
            border-radius: 0 0 16px 16px;
            padding: 24px;
            box-shadow: 0 4px 15px var(--shadow-color);
            min-height: 500px;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        /* 操作栏 */
        .action-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 16px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            background: var(--bg-secondary);
            padding: 8px 12px;
            border-radius: 12px;
            flex: 1;
            max-width: 500px;
        }

        .search-box input {
            border: none;
            background: none;
            outline: none;
            font-size: 14px;
            color: var(--text-primary);
            flex: 1;
        }

        .btn-add {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .btn-add:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        /* 表格 */
        .data-table {
            width: 100%;
            border-collapse: collapse;
        }

        .data-table th,
        .data-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .data-table th {
            background: var(--table-stripe);
            font-weight: 600;
            color: var(--text-primary);
            font-size: 14px;
        }

        .data-table tr:hover {
            background: var(--table-stripe);
        }

        .data-table td {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .table-actions {
            display: flex;
            gap: 8px;
        }

        .btn-icon {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-edit {
            background: #e0f2fe;
            color: #0284c7;
        }

        .btn-edit:hover {
            background: #bae6fd;
        }

        .btn-delete {
            background: #fee2e2;
            color: #dc2626;
        }

        .btn-delete:hover {
            background: #fecaca;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: var(--bg-card);
            border-radius: 20px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h3 {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-primary);
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            background: var(--bg-secondary);
            border-radius: 8px;
            cursor: pointer;
            font-size: 18px;
            color: var(--text-secondary);
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            background: var(--bg-input);
            color: var(--text-primary);
            transition: border-color 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn-cancel {
            background: var(--bg-secondary);
            color: var(--text-secondary);
        }

        .btn-cancel:hover {
            background: #e5e6ea;
        }

        .btn-save {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .btn-save:hover {
            opacity: 0.9;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            right: 24px;
            background: #333;
            color: white;
            padding: 14px 24px;
            border-radius: 12px;
            font-size: 14px;
            transform: translateX(120%);
            transition: transform 0.3s ease;
            z-index: 2000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 16px;
        }

        /* 加载状态 */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 16px 0;
        }

        .pagination button {
            min-width: 36px;
            height: 36px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 10px;
        }

        .pagination button:hover:not(:disabled) {
            border-color: var(--primary);
            color: var(--primary);
        }

        .pagination button.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border-color: transparent;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .pagination .page-info {
            font-size: 13px;
            color: var(--text-light);
            padding: 0 8px;
        }

        .pagination .page-size-select {
            height: 36px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 0 8px;
            font-size: 13px;
            color: var(--text-secondary);
            outline: none;
            background: var(--bg-card);
            cursor: pointer;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .header {
                padding: 12px 16px;
            }

            .header-title {
                font-size: 18px;
            }

            .container {
                padding: 16px;
            }

            .tab-btn {
                padding: 12px 16px;
                font-size: 14px;
            }

            .form-row {
                grid-template-columns: 1fr;
            }

            .action-bar {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                max-width: none;
            }
        }

        /* 学习记录样式 */
        .record-item {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .record-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
        }

        .record-details h4 {
            font-size: 16px;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .record-details p {
            font-size: 13px;
            color: var(--text-light);
        }

        .record-score {
            text-align: right;
        }

        .record-score .score {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary);
        }

        .record-score .label {
            font-size: 12px;
            color: var(--text-light);
        }

        /* 深色模式切换按钮 */
        .theme-toggle {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .theme-toggle:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <header class="header">
        <div class="header-left">
            <span class="logo">📚</span>
            <h1 class="header-title">学习管理系统</h1>
        </div>
        <div class="header-right">
            <button class="theme-toggle" id="themeToggle" title="切换深色模式">
                <i class="fas fa-moon" id="themeIcon"></i>
            </button>
            <button class="btn btn-back" onclick="location.href='index.html'">
                <i class="fas fa-home"></i> 返回学习
            </button>
            <button class="btn btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> 退出
            </button>
        </div>
    </header>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #FF6B6B 0%, #FF8E8E 100%); color: white;">
                    <i class="fas fa-book"></i>
                </div>
                <div class="stat-info">
                    <h3 id="statHanzi">0</h3>
                    <p>汉字</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #4ECDC4 0%, #6EE7DE 100%); color: white;">
                    <i class="fas fa-calculator"></i>
                </div>
                <div class="stat-info">
                    <h3 id="statNumber">0</h3>
                    <p>数字</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #FBBF24 0%, #FCD34D 100%); color: white;">
                    <i class="fas fa-plus-minus"></i>
                </div>
                <div class="stat-info">
                    <h3 id="statArithmetic">0</h3>
                    <p>算数题</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #A78BFA 0%, #C4B5FD 100%); color: white;">
                    <i class="fas fa-font"></i>
                </div>
                <div class="stat-info">
                    <h3 id="statLetter">0</h3>
                    <p>字母</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: linear-gradient(135deg, #60A5FA 0%, #93C5FD 100%); color: white;">
                    <i class="fas fa-spell-check"></i>
                </div>
                <div class="stat-info">
                    <h3 id="statWord">0</h3>
                    <p>单词</p>
                </div>
            </div>
        </div>

        <!-- Tab 导航 -->
        <div class="tab-nav">
            <button class="tab-btn active" data-tab="hanzi">
                <i class="fas fa-book"></i> 汉字管理
            </button>
            <button class="tab-btn" data-tab="number">
                <i class="fas fa-calculator"></i> 数字管理
            </button>
            <button class="tab-btn" data-tab="arithmetic">
                <i class="fas fa-plus-minus"></i> 算数管理
            </button>
            <button class="tab-btn" data-tab="letter">
                <i class="fas fa-font"></i> 字母管理
            </button>
            <button class="tab-btn" data-tab="word">
                <i class="fas fa-spell-check"></i> 单词管理
            </button>
            <button class="tab-btn" data-tab="records">
                <i class="fas fa-history"></i> 学习记录
            </button>
        </div>

        <!-- 内容区 -->
        <div class="tab-content">
            <!-- 汉字管理 -->
            <div class="tab-panel active" id="panel-hanzi">
                <div class="action-bar">
                    <div class="search-box">
                        <i class="fas fa-search" style="color: #888;"></i>
                        <input type="text" placeholder="搜索汉字..." id="searchHanzi" onkeypress="if(event.key==='Enter')doSearch('hanzi')">
                        <button class="btn btn-add" style="padding:8px 16px;font-size:13px;" onclick="doSearch('hanzi')"><i class="fas fa-search"></i> 查询</button>
                    </div>
                    <button class="btn btn-add" onclick="openModal('hanzi')">
                        <i class="fas fa-plus"></i> 添加汉字
                    </button>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>汉字</th>
                                <th>拼音</th>
                                <th>释义</th>
                                <th>示例词</th>
                                <th>难度</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="hanziTable"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-hanzi"></div>
            </div>

            <!-- 数字管理 -->
            <div class="tab-panel" id="panel-number">
                <div class="action-bar">
                    <div class="search-box">
                        <i class="fas fa-search" style="color: #888;"></i>
                        <input type="text" placeholder="搜索数字..." id="searchNumber" onkeypress="if(event.key==='Enter')doSearch('number')">
                        <button class="btn btn-add" style="padding:8px 16px;font-size:13px;" onclick="doSearch('number')"><i class="fas fa-search"></i> 查询</button>
                    </div>
                    <button class="btn btn-add" onclick="openModal('number')">
                        <i class="fas fa-plus"></i> 添加数字
                    </button>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>数字</th>
                                <th>英文</th>
                                <th>图片URL</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="numberTable"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-number"></div>
            </div>

            <!-- 算数管理 -->
            <div class="tab-panel" id="panel-arithmetic">
                <div class="action-bar">
                    <div class="search-box">
                        <i class="fas fa-search" style="color: #888;"></i>
                        <input type="text" placeholder="搜索题目..." id="searchArithmetic" onkeypress="if(event.key==='Enter')doSearch('arithmetic')">
                        <button class="btn btn-add" style="padding:8px 16px;font-size:13px;" onclick="doSearch('arithmetic')"><i class="fas fa-search"></i> 查询</button>
                    </div>
                    <button class="btn btn-add" onclick="openModal('arithmetic')">
                        <i class="fas fa-plus"></i> 添加题目
                    </button>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>题目</th>
                                <th>答案</th>
                                <th>难度</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="arithmeticTable"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-arithmetic"></div>
            </div>

            <!-- 字母管理 -->
            <div class="tab-panel" id="panel-letter">
                <div class="action-bar">
                    <div class="search-box">
                        <i class="fas fa-search" style="color: #888;"></i>
                        <input type="text" placeholder="搜索字母..." id="searchLetter" onkeypress="if(event.key==='Enter')doSearch('letter')">
                        <button class="btn btn-add" style="padding:8px 16px;font-size:13px;" onclick="doSearch('letter')"><i class="fas fa-search"></i> 查询</button>
                    </div>
                    <button class="btn btn-add" onclick="openModal('letter')">
                        <i class="fas fa-plus"></i> 添加字母
                    </button>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>字母</th>
                                <th>示例单词</th>
                                <th>图片URL</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="letterTable"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-letter"></div>
            </div>

            <!-- 单词管理 -->
            <div class="tab-panel" id="panel-word">
                <div class="action-bar">
                    <div class="search-box">
                        <i class="fas fa-search" style="color: #888;"></i>
                        <input type="text" placeholder="搜索单词..." id="searchWord" onkeypress="if(event.key==='Enter')doSearch('word')">
                        <button class="btn btn-add" style="padding:8px 16px;font-size:13px;" onclick="doSearch('word')"><i class="fas fa-search"></i> 查询</button>
                    </div>
                    <button class="btn btn-add" onclick="openModal('word')">
                        <i class="fas fa-plus"></i> 添加单词
                    </button>
                </div>
                <div class="table-wrapper">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>单词</th>
                                <th>中文释义</th>
                                <th>分类</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="wordTable"></tbody>
                    </table>
                </div>
                <div class="pagination" id="pagination-word"></div>
            </div>

            <!-- 学习记录 -->
            <div class="tab-panel" id="panel-records">
                <div class="action-bar">
                    <div class="search-box">
                        <i class="fas fa-search" style="color: #888;"></i>
                        <input type="text" placeholder="搜索用户..." id="searchRecord" onkeypress="if(event.key==='Enter')doSearch('records')">
                        <button class="btn btn-add" style="padding:8px 16px;font-size:13px;" onclick="doSearch('records')"><i class="fas fa-search"></i> 查询</button>
                    </div>
                </div>
                <div id="recordsList"></div>
                <div class="pagination" id="pagination-records"></div>
            </div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modalTitle">添加</h3>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalBody"></div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-save" onclick="saveData()">保存</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const API_BASE = '/api';
        let currentModule = 'hanzi';
        let editingId = null;
        let allData = {
            hanzi: [],
            number: [],
            arithmetic: [],
            letter: [],
            word: [],
            records: []
        };
        // 分页状态
        let pageState = {
            hanzi: { page: 0, size: 10, totalElements: 0, totalPages: 0 },
            number: { page: 0, size: 10, totalElements: 0, totalPages: 0 },
            arithmetic: { page: 0, size: 10, totalElements: 0, totalPages: 0 },
            letter: { page: 0, size: 10, totalElements: 0, totalPages: 0 },
            word: { page: 0, size: 10, totalElements: 0, totalPages: 0 },
            records: { page: 0, size: 10, totalElements: 0, totalPages: 0 }
        };
        // 搜索关键字
        let searchKeywords = {
            hanzi: '', number: '', arithmetic: '', letter: '', word: '', records: ''
        };
        // 全量数据缓存（用于前端搜索）
        let fullDataCache = {
            hanzi: null, number: null, arithmetic: null, letter: null, word: null, records: null
        };

        // Toast
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast show ' + type;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Tab 切换（每次切换都刷新数据）
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('panel-' + btn.dataset.tab).classList.add('active');
                currentModule = btn.dataset.tab;
                // 清除缓存，强制重新加载最新数据
                fullDataCache[btn.dataset.tab] = null;
                pageState[btn.dataset.tab].page = 0;

                if (btn.dataset.tab === 'records') {
                    loadRecords();
                } else {
                    loadData(btn.dataset.tab);
                }
            });
        });

        // 加载数据（分页）
        async function loadData(module, keyword) {
            try {
                const ps = pageState[module];
                let url = `${API_BASE}/admin/${module}?page=0&size=${Math.max(ps.size * 10, 100)}`;
                // records 模块用不同的接口
                if (module === 'records') {
                    url = `${API_BASE}/study/records?page=0&size=${Math.max(ps.size * 10, 100)}`;
                }
                const res = await fetch(url);
                if (!res.ok) throw new Error('加载失败');
                const rawData = await res.json();

                // 兼容处理：后端可能返回 Page 对象或数组
                let fullList;
                if (Array.isArray(rawData)) {
                    fullList = rawData;
                    ps.totalElements = rawData.length;
                } else {
                    fullList = rawData.content || [];
                    ps.totalElements = (rawData.totalElements ?? rawData.total_elements ?? rawData.total) || fullList.length;
                }
                fullDataCache[module] = fullList;

                // 更新统计卡片
                updateStat(module, ps.totalElements);

                // 应用搜索过滤 + 分页
                applyFilterAndPage(module);
            } catch (e) {
                console.error(e);
                showToast('加载数据失败', 'error');
            }
        }

        // 前端搜索过滤 + 手动分页
        function applyFilterAndPage(module) {
            const fullList = fullDataCache[module] || [];
            const keyword = (searchKeywords[module] || '').trim().toLowerCase();
            const ps = pageState[module];

            // 搜索过滤
            let filtered = fullList;
            if (keyword) {
                filtered = fullList.filter(item => filterItem(item, module, keyword));
            }
            // 记录过滤后的总数（用于分页）
            ps.filteredTotal = filtered.length;
            ps.totalPages = Math.max(1, Math.ceil(filtered.length / ps.size));

            // 当前页数据
            const start = ps.page * ps.size;
            const end = start + ps.size;
            allData[module] = filtered.slice(start, end);

            renderTable(module);
            renderPagination(module);
        }

        // 单条数据搜索匹配
        function filterItem(item, module, keyword) {
            switch (module) {
                case 'hanzi':
                    return (item.hanzi || '').toLowerCase().includes(keyword)
                        || (item.pinyin || '').toLowerCase().includes(keyword)
                        || (item.meaning || '').includes(keyword);
                case 'number':
                    return String(item.numberValue || '').includes(keyword)
                        || (item.englishName || '').toLowerCase().includes(keyword);
                case 'arithmetic':
                    return (item.question || '').toLowerCase().includes(keyword)
                        || String(item.answer || '').includes(keyword);
                case 'letter':
                    return (item.letterUpper || '').toLowerCase().includes(keyword)
                        || (item.letterLower || '').toLowerCase().includes(keyword)
                        || (item.wordExample || '').toLowerCase().includes(keyword);
                case 'word':
                    return (item.word || '').toLowerCase().includes(keyword)
                        || (item.meaning || '').includes(keyword)
                        || (item.category || '').includes(keyword);
                case 'records':
                    return (item.moduleType || '').toLowerCase().includes(keyword)
                        || JSON.stringify(item).includes(keyword);
                default:
                    return JSON.stringify(item).toLowerCase().includes(keyword);
            }
        }

        // 执行搜索
        function doSearch(module) {
            const input = document.getElementById('search' + module.charAt(0).toUpperCase() + module.slice(1));
            searchKeywords[module] = input ? input.value : '';
            pageState[module].page = 0;
            // 如果还没有缓存全量数据，重新加载
            if (fullDataCache[module] === null) {
                if (module === 'records') loadRecords();
                else loadData(module);
            } else {
                applyFilterAndPage(module);
            }
        }

        // 更新统计数字
        function updateStat(module, count) {
            const statMap = { hanzi: 'Hanzi', number: 'Number', arithmetic: 'Arithmetic', letter: 'Letter', word: 'Word' };
            const statId = 'stat' + (statMap[module] || module);
            const el = document.getElementById(statId);
            if (el) el.textContent = count;
        }

        // 渲染表格
        function renderTable(module) {
            const tbody = document.getElementById(module + 'Table');
            if (!tbody) return;

            if (allData[module].length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="10">
                            <div class="empty-state">
                                <i class="fas fa-inbox"></i>
                                <p>暂无数据</p>
                            </div>
                        </td>
                    </tr>`;
                return;
            }

            let html = '';
            switch (module) {
                case 'hanzi':
                    allData[module].forEach(item => {
                        html += `
                            <tr>
                                <td><strong style="font-size:18px;">${item.hanzi}</strong></td>
                                <td>${item.pinyin || '-'}</td>
                                <td>${item.meaning || '-'}</td>
                                <td>${item.exampleWord || '-'}</td>
                                <td>${'⭐'.repeat(item.difficulty || 1)}</td>
                                <td>
                                    <div class="table-actions">
                                        <button class="btn-icon btn-edit" onclick="editItem('hanzi', ${item.id})">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn-icon btn-delete" onclick="deleteItem('hanzi', ${item.id})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>`;
                    });
                    break;
                case 'number':
                    allData[module].forEach(item => {
                        html += `
                            <tr>
                                <td><strong style="font-size:18px;">${item.numberValue}</strong></td>
                                <td>${item.englishName || '-'}</td>
                                <td>${item.imageUrl ? '<a href="' + item.imageUrl + '" target="_blank">查看</a>' : '-'}</td>
                                <td>
                                    <div class="table-actions">
                                        <button class="btn-icon btn-edit" onclick="editItem('number', ${item.id})">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn-icon btn-delete" onclick="deleteItem('number', ${item.id})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>`;
                    });
                    break;
                case 'arithmetic':
                    allData[module].forEach(item => {
                        html += `
                            <tr>
                                <td><strong>${item.question}</strong></td>
                                <td>${item.answer}</td>
                                <td>${'⭐'.repeat(item.difficulty || 1)}</td>
                                <td>
                                    <div class="table-actions">
                                        <button class="btn-icon btn-edit" onclick="editItem('arithmetic', ${item.id})">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn-icon btn-delete" onclick="deleteItem('arithmetic', ${item.id})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>`;
                    });
                    break;
                case 'letter':
                    allData[module].forEach(item => {
                        html += `
                            <tr>
                                <td><strong style="font-size:18px;">${(item.letterUpper || '').toUpperCase()}</strong> / ${(item.letterLower || '').toLowerCase()}</td>
                                <td>${item.wordExample || '-'}</td>
                                <td>${item.imageUrl ? '<a href="' + item.imageUrl + '" target="_blank">查看</a>' : '-'}</td>
                                <td>
                                    <div class="table-actions">
                                        <button class="btn-icon btn-edit" onclick="editItem('letter', ${item.id})">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn-icon btn-delete" onclick="deleteItem('letter', ${item.id})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>`;
                    });
                    break;
                case 'word':
                    allData[module].forEach(item => {
                        html += `
                            <tr>
                                <td><strong style="font-size:16px;color:#667eea;">${item.word}</strong></td>
                                <td>${item.meaning || '-'}</td>
                                <td>${item.category || '-'}</td>
                                <td>
                                    <div class="table-actions">
                                        <button class="btn-icon btn-edit" onclick="editItem('word', ${item.id})">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button class="btn-icon btn-delete" onclick="deleteItem('word', ${item.id})">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>`;
                    });
                    break;
            }
            tbody.innerHTML = html;
        }

        // 渲染分页组件（始终显示）
        function renderPagination(module) {
            const container = document.getElementById('pagination-' + module);
            if (!container) return;

            const ps = pageState[module];
            const totalPages = ps.totalPages || 1;
            const current = ps.page;
            const totalCount = ps.filteredTotal != null ? ps.filteredTotal : ps.totalElements;

            let html = '';

            // 翻页按钮区域
            if (totalPages > 1) {
                // 上一页按钮
                html += `<button ${current === 0 ? 'disabled' : ''} onclick="goPage('${module}', ${current - 1})"><i class="fas fa-chevron-left"></i></button>`;

                // 页码按钮（最多显示7个页码）
                let start = Math.max(0, current - 3);
                let end = Math.min(totalPages - 1, start + 6);
                if (end - start < 6) start = Math.max(0, end - 6);

                for (let i = start; i <= end; i++) {
                    html += `<button class="${i === current ? 'active' : ''}" onclick="goPage('${module}', ${i})">${i + 1}</button>`;
                }

                // 下一页按钮
                html += `<button ${current >= totalPages - 1 ? 'disabled' : ''} onclick="goPage('${module}', ${current + 1})"><i class="fas fa-chevron-right"></i></button>`;
            }

            // 信息区 + 每页条数选择器
            html += `<span class="page-info">共 ${totalCount} 条 / 第 ${totalPages > 0 ? current + 1 : 0}/${totalPages} 页</span>`;
            html += `<select class="page-size-select" onchange="changePageSize('${module}', this.value)">
                <option value="5" ${ps.size === 5 ? 'selected' : ''}>5/页</option>
                <option value="10" ${ps.size === 10 ? 'selected' : ''}>10/页</option>
                <option value="20" ${ps.size === 20 ? 'selected' : ''}>20/页</option>
                <option value="50" ${ps.size === 50 ? 'selected' : ''}>50/页</option>
            </select>`;

            container.innerHTML = html;
        }

        // 跳转页码（前端分页）
        function goPage(module, page) {
            const ps = pageState[module];
            if (page < 0 || page >= ps.totalPages) return;
            ps.page = page;
            applyFilterAndPage(module);
        }

        // 改变每页大小
        function changePageSize(module, size) {
            pageState[module].size = parseInt(size);
            pageState[module].page = 0;
            if (fullDataCache[module] !== null) {
                applyFilterAndPage(module);
            } else {
                if (module === 'records') loadRecords();
                else loadData(module);
            }
        }

        // 加载学习记录（分页 + 缓存）
        async function loadRecords() {
            try {
                const ps = pageState.records;
                const res = await fetch(`${API_BASE}/study/records?page=0&size=${Math.max(ps.size * 10, 100)}`);
                if (!res.ok) throw new Error('加载失败');
                const rawData = await res.json();
                let fullList;
                if (Array.isArray(rawData)) {
                    fullList = rawData;
                    ps.totalElements = rawData.length;
                } else {
                    fullList = rawData.content || [];
                    ps.totalElements = (rawData.totalElements ?? rawData.total_elements ?? rawData.total) || fullList.length;
                }
                fullDataCache.records = fullList;
                applyFilterAndPage('records');
            } catch (e) {
                console.error(e);
                showToast('加载记录失败', 'error');
            }
        }

        // 渲染记录
        function renderRecords() {
            const container = document.getElementById('recordsList');
            if (allData.records.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-history"></i>
                        <p>暂无学习记录</p>
                    </div>`;
                return;
            }

            const moduleIcons = {
                hanzi: '\uD83D\uDCDA',
                number: '\uD83D\uDD22',
                arithmetic: '\u2795',
                letter: '\uD83D\uDD24',
                word: '\uD83D\uDCDD'
            };

            const moduleNames = {
                hanzi: '汉字',
                number: '数字',
                arithmetic: '算数',
                letter: '字母',
                word: '单词'
            };

            let html = '';
            allData.records.forEach(record => {
                const date = new Date(record.createdAt).toLocaleString('zh-CN');
                html += `
                    <div class="record-item">
                        <div class="record-info">
                            <div class="record-icon">${moduleIcons[record.moduleType] || '\uD83D\uDCDD'}</div>
                            <div class="record-details">
                                <h4>${moduleNames[record.moduleType] || record.moduleType}学习</h4>
                                <p>${date} \u00B7 ${JSON.parse(record.questionIds || '[]').length}\u9053\u9898</p>
                            </div>
                        </div>
                        <div class="record-score">
                            <div class="score">${record.score}%</div>
                            <div class="label">\u6B63\u786E\u7387</div>
                        </div>
                    </div>`;
            });
            container.innerHTML = html;
        }

        // 打开模态框
        function openModal(module, id = null) {
            editingId = id;
            const titles = {
                hanzi: id ? '编辑汉字' : '添加汉字',
                number: id ? '编辑数字' : '添加数字',
                arithmetic: id ? '编辑题目' : '添加题目',
                letter: id ? '编辑字母' : '添加字母',
                word: id ? '编辑单词' : '添加单词'
            };

            document.getElementById('modalTitle').textContent = titles[module];

            let formHtml = '';
            switch (module) {
                case 'hanzi':
                    formHtml = `
                        <div class="form-row">
                            <div class="form-group">
                                <label>汉字 *</label>
                                <input type="text" id="fieldHanzi" placeholder="如：一" maxlength="1">
                            </div>
                            <div class="form-group">
                                <label>拼音</label>
                                <input type="text" id="fieldPinyin" placeholder="如：yī">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>释义</label>
                            <input type="text" id="fieldMeaning" placeholder="如：一个、第一">
                        </div>
                        <div class="form-group">
                            <label>示例词</label>
                            <input type="text" id="fieldExample" placeholder="如：一个苹果">
                        </div>
                        <div class="form-group">
                            <label>难度 (1-3)</label>
                            <select id="fieldDifficulty">
                                <option value="1">⭐ 简单</option>
                                <option value="2">⭐⭐ 中等</option>
                                <option value="3">⭐⭐⭐ 困难</option>
                            </select>
                        </div>`;
                    break;
                case 'number':
                    formHtml = `
                        <div class="form-row">
                            <div class="form-group">
                                <label>数字 *</label>
                                <input type="number" id="fieldNumber" placeholder="0-20" min="0" max="20">
                            </div>
                            <div class="form-group">
                                <label>英文名称 *</label>
                                <input type="text" id="fieldEnglish" placeholder="如：one">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>中文读音 *</label>
                                <input type="text" id="fieldChinese" placeholder="如：yī">
                            </div>
                            <div class="form-group">
                                <label>颜色</label>
                                <input type="text" id="fieldColor" placeholder="如：red">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>图片URL</label>
                            <input type="text" id="fieldImage" placeholder="https://...">
                        </div>`;
                    break;
                case 'arithmetic':
                    formHtml = `
                        <div class="form-row">
                            <div class="form-group">
                                <label>题目 *</label>
                                <input type="text" id="fieldQuestion" placeholder="如：2+3">
                            </div>
                            <div class="form-group">
                                <label>答案 *</label>
                                <input type="number" id="fieldAnswer" placeholder="5">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>难度 (1-3)</label>
                            <select id="fieldDifficulty">
                                <option value="1">⭐ 简单</option>
                                <option value="2">⭐⭐ 中等</option>
                                <option value="3">⭐⭐⭐ 困难</option>
                            </select>
                        </div>`;
                    break;
                case 'letter':
                    formHtml = `
                        <div class="form-row">
                            <div class="form-group">
                                <label>字母 *</label>
                                <input type="text" id="fieldLetter" placeholder="A" maxlength="1">
                            </div>
                            <div class="form-group">
                                <label>示例单词</label>
                                <input type="text" id="fieldWordExample" placeholder="Apple">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>图片URL</label>
                            <input type="text" id="fieldImage" placeholder="https://...">
                        </div>`;
                    break;
                case 'word':
                    formHtml = `
                        <div class="form-group">
                            <label>单词 *</label>
                            <input type="text" id="fieldWord" placeholder="如：apple">
                        </div>
                        <div class="form-group">
                            <label>中文释义</label>
                            <input type="text" id="fieldMeaning" placeholder="如：苹果">
                        </div>
                        <div class="form-group">
                            <label>分类</label>
                            <select id="fieldCategory">
                                <option value="">选择分类</option>
                                <option value="动物">动物</option>
                                <option value="颜色">颜色</option>
                                <option value="水果">水果</option>
                                <option value="食物">食物</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>图片URL</label>
                            <input type="text" id="fieldImage" placeholder="https://...">
                        </div>`;
                    break;
            }

            document.getElementById('modalBody').innerHTML = formHtml;
            document.getElementById('modalOverlay').classList.add('active');

            if (id) {
                loadEditData(module, id);
            }
        }

        // 加载编辑数据
        function loadEditData(module, id) {
            const item = allData[module].find(i => i.id === id);
            if (!item) return;

            switch (module) {
                case 'hanzi':
                    document.getElementById('fieldHanzi').value = item.hanzi;
                    document.getElementById('fieldPinyin').value = item.pinyin || '';
                    document.getElementById('fieldMeaning').value = item.meaning || '';
                    document.getElementById('fieldExample').value = item.exampleWord || '';
                    document.getElementById('fieldDifficulty').value = item.difficulty || 1;
                    break;
                case 'number':
                    document.getElementById('fieldNumber').value = item.numberValue;
                    document.getElementById('fieldEnglish').value = item.englishName || '';
                    document.getElementById('fieldChinese').value = item.chineseReading || '';
                    document.getElementById('fieldColor').value = item.color || '';
                    document.getElementById('fieldImage').value = item.imageUrl || '';
                    break;
                case 'arithmetic':
                    document.getElementById('fieldQuestion').value = item.question;
                    document.getElementById('fieldAnswer').value = item.answer;
                    document.getElementById('fieldDifficulty').value = item.difficulty || 1;
                    break;
                case 'letter':
                    document.getElementById('fieldLetter').value = item.letterUpper || item.letterLower || '';
                    document.getElementById('fieldWordExample').value = item.wordExample || '';
                    document.getElementById('fieldImage').value = item.imageUrl || '';
                    break;
                case 'word':
                    document.getElementById('fieldWord').value = item.word;
                    document.getElementById('fieldMeaning').value = item.meaning || '';
                    document.getElementById('fieldCategory').value = item.category || '';
                    document.getElementById('fieldImage').value = item.imageUrl || '';
                    break;
            }
        }

        // 编辑
        function editItem(module, id) {
            openModal(module, id);
        }

        // 删除（删除后重新加载）
        async function deleteItem(module, id) {
            if (!confirm('确定要删除这条记录吗？')) return;

            try {
                const res = await fetch(`${API_BASE}/admin/${module}/${id}`, {
                    method: 'DELETE'
                });
                if (!res.ok) throw new Error('删除失败');
                showToast('删除成功', 'success');
                // 清除缓存重新加载
                fullDataCache[module] = null;
                pageState[module].page = 0;
                if (module === 'records') loadRecords();
                else loadData(module);
            } catch (e) {
                showToast('删除失败', 'error');
            }
        }

        // 关闭模态框
        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
            editingId = null;
        }

        // 保存数据
        async function saveData() {
            let data = {};
            let url = `${API_BASE}/admin/${currentModule}`;
            let method = editingId ? 'PUT' : 'POST';

            if (editingId) {
                url += `/${editingId}`;
            }

            switch (currentModule) {
                case 'hanzi':
                    data = {
                        hanzi: document.getElementById('fieldHanzi').value,
                        pinyin: document.getElementById('fieldPinyin').value,
                        meaning: document.getElementById('fieldMeaning').value,
                        exampleWord: document.getElementById('fieldExample').value,
                        difficulty: parseInt(document.getElementById('fieldDifficulty').value)
                    };
                    if (!data.hanzi) {
                        showToast('请输入汉字', 'error');
                        return;
                    }
                    break;
                case 'number':
                    data = {
                        numberValue: parseInt(document.getElementById('fieldNumber').value),
                        englishName: document.getElementById('fieldEnglish').value,
                        chineseReading: document.getElementById('fieldChinese').value,
                        color: document.getElementById('fieldColor').value,
                        imageUrl: document.getElementById('fieldImage').value
                    };
                    if (isNaN(data.numberValue)) {
                        showToast('请输入数字', 'error');
                        return;
                    }
                    if (!data.englishName) {
                        showToast('请输入英文名称', 'error');
                        return;
                    }
                    if (!data.chineseReading) {
                        showToast('请输入中文读音', 'error');
                        return;
                    }
                    break;
                case 'arithmetic':
                    data = {
                        question: document.getElementById('fieldQuestion').value,
                        answer: parseInt(document.getElementById('fieldAnswer').value),
                        difficulty: parseInt(document.getElementById('fieldDifficulty').value)
                    };
                    if (!data.question || isNaN(data.answer)) {
                        showToast('请填写题目和答案', 'error');
                        return;
                    }
                    break;
                case 'letter':
                    data = {
                        letter: document.getElementById('fieldLetter').value.toUpperCase(),
                        wordExample: document.getElementById('fieldWordExample').value,
                        imageUrl: document.getElementById('fieldImage').value
                    };
                    if (!data.letter) {
                        showToast('请输入字母', 'error');
                        return;
                    }
                    break;
                case 'word':
                    data = {
                        word: document.getElementById('fieldWord').value,
                        meaning: document.getElementById('fieldMeaning').value,
                        category: document.getElementById('fieldCategory').value,
                        imageUrl: document.getElementById('fieldImage').value
                    };
                    if (!data.word) {
                        showToast('请输入单词', 'error');
                        return;
                    }
                    break;
            }

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (!res.ok) throw new Error('保存失败');
                showToast(editingId ? '更新成功' : '添加成功', 'success');
                closeModal();
                // 清除缓存重新加载
                fullDataCache[currentModule] = null;
                pageState[currentModule].page = 0;
                if (currentModule === 'records') loadRecords();
                else loadData(currentModule);
            } catch (e) {
                showToast('保存失败', 'error');
            }
        }

        // 加载统计（使用分页接口的 totalElements）
        async function loadStats() {
            const moduleMap = [
                { key: 'hanzi', id: 'statHanzi' },
                { key: 'number', id: 'statNumber' },
                { key: 'arithmetic', id: 'statArithmetic' },
                { key: 'letter', id: 'statLetter' },
                { key: 'word', id: 'statWord' }
            ];
            for (const { key, id } of moduleMap) {
                try {
                    const res = await fetch(`${API_BASE}/admin/${key}?page=0&size=1`);
                    if (res.ok) {
                        const data = await res.json();
                        const count = (data.totalElements ?? data.total_elements ?? data.total ?? (Array.isArray(data) ? data.length : 0));
                        document.getElementById(id).textContent = count;
                    }
                } catch (e) {
                    console.error(e);
                }
            }
        }

        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                location.href = 'index.html';
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadStats();
            loadData('hanzi');
        });

        // 点击模态框外部关闭
        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target.id === 'modalOverlay') {
                closeModal();
            }
        });

        // ==================== 深色模式 ====================
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'light';
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('themeIcon');
            if (theme === 'dark') {
                icon.className = 'fas fa-sun';
            } else {
                icon.className = 'fas fa-moon';
            }
        }

        document.getElementById('themeToggle').addEventListener('click', toggleTheme);
    </script>
</body>
</html>
