<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>汉字卡片</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #FF8C42;
            --accent: #FF6B6B;
            --bg-gradient: linear-gradient(135deg, #FF9A56 0%, #FF6B6B 50%, #FF8E53 100%);
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            background: var(--bg-gradient);
            padding: 20px;
        }

        .header {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 14px 22px;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .back-btn {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none; border-radius: 11px;
            color: white; font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s; flex-shrink: 0;
        }
        .back-btn:hover { transform: scale(1.06); }
        .title { font-size: 20px; font-weight: bold; color: #333; white-space: nowrap; }

        .search-box { flex: 1; position: relative; }
        .search-input {
            width: 100%; padding: 10px 85px 10px 38px;
            border: 2px solid #e8e8e8; border-radius: 12px;
            font-size: 14px; outline: none; transition: all 0.25s; background: #f9f9f9;
        }
        .search-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(255,140,66,0.12); }
        .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #bbb; font-size: 14px; }
        .search-btn {
            position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
            padding: 8px 16px; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 9px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.25s;
        }
        .search-btn:hover { transform: translateY(-50%) scale(1.05); }

        /* 统计栏 */
        .stats-bar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 2px 4px; margin-bottom: 12px;
        }
        .stats-text { font-size: 14px; color: rgba(255,255,255,0.9); font-weight: 500; }
        .stats-text strong { color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.15); }

        /* 卡片网格 */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 18px;
        }

        /* 卡片 */
        .hanzi-card {
            background: rgba(255,255,255,0.97);
            border-radius: 18px;
            padding: 30px 16px 22px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.09);
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
            display: flex; flex-direction: column; align-items: center;
        }
        .hanzi-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 4px; background: linear-gradient(90deg, #FF8C42, #FFD166, #FF6B6B);
            opacity: 0; transition: opacity 0.3s;
        }
        .hanzi-card:hover { transform: translateY(-6px) scale(1.04); box-shadow: 0 16px 40px rgba(0,0,0,0.15); }
        .hanzi-card:hover::before { opacity: 1; }

        .card-img-wrap {
            width: 80px; height: 80px; margin-bottom: 8px;
            border-radius: 14px; overflow: hidden;
            background: #f3ece5; border: 2px solid #ede0d5;
            flex-shrink: 0; display: none;
        }
        .card-img-wrap.has-img { display: block; }
        .card-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .card-hanzi {
            font-size: 88px; font-weight: 900; color: #222;
            line-height: 1; margin-bottom: 6px;
            transition: transform 0.3s;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.06);
            flex-shrink: 0;
        }
        .hanzi-card:hover .card-hanzi { transform: scale(1.1); }

        .card-pinyin { font-size: 20px; color: var(--primary); font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
        .card-meaning { font-size: 14px; color: #777; line-height: 1.4; }
        .card-example { font-size: 11px; color: #aaa; margin-top: 3px; }

        /* 空状态 / 加载 */
        .empty-state, .loading {
            grid-column: 1 / -1; text-align: center; padding: 60px 20px;
            background: rgba(255,255,255,0.95); border-radius: 18px;
        }
        .empty-icon { font-size: 56px; margin-bottom: 12px; }
        .empty-text { font-size: 17px; color: #888; }
        .loading-spinner {
            width: 44px; height: 44px; border: 4px solid #ffe0c0; border-top-color: var(--primary);
            border-radius: 50%; animation: spin 0.85s linear infinite; margin: 0 auto 14px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 分页栏 */
        .pagination-bar {
            background: rgba(255,255,255,0.95); border-radius: 16px;
            padding: 14px 22px; display: flex; align-items: center; justify-content: center;
            gap: 7px; box-shadow: 0 4px 16px rgba(0,0,0,0.07);
            margin-top: 16px; flex-wrap: wrap;
        }

        .page-btn {
            min-width: 38px; height: 38px; border: 2px solid #eee; border-radius: 9px;
            background: white; font-size: 13px; font-weight: 700; cursor: pointer;
            transition: all 0.25s; display: flex; align-items: center; justify-content: center; color: #555;
        }
        .page-btn:hover:not(:disabled) { border-color: var(--primary); color: var(--primary); }
        .page-btn.active { background: linear-gradient(135deg, var(--primary), var(--accent)); border-color: transparent; color: white; box-shadow: 0 3px 10px rgba(255,140,66,0.28); }
        .page-btn:disabled { opacity: 0.35; cursor: not-allowed; background: #fafafa; }
        .page-dots { color: #ccc; font-size: 13px; padding: 0 2px; user-select: none; }
        .page-info { font-size: 13px; color: #999; font-weight: 500; margin-left: 6px; white-space: nowrap; }

        .page-jump { display: inline-flex; align-items: center; gap: 5px; margin-left: 10px; }
        .page-jump-input { width: 52px; height: 34px; border: 2px solid #eee; border-radius: 8px; text-align: center; font-size: 13px; font-weight: 700; outline: none; transition: all 0.25s; }
        .page-jump-input:focus { border-color: var(--primary); background: white; box-shadow: 0 0 0 3px rgba(255,140,66,0.12); }
        .page-jump-btn { height: 34px; padding: 0 12px; background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; border: none; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.25s; }
        .page-jump-btn:hover { transform: scale(1.05); }

        /* 弹窗 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.55); z-index: 200; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }

        .modal-card {
            background: linear-gradient(145deg, #fff 0%, #fef7ee 100%);
            border-radius: 28px; width: 92%; max-width: 440px;
            padding: 44px 32px; text-align: center;
            animation: modalPop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 25px 60px rgba(0,0,0,0.25); position: relative;
        }
        @keyframes modalPop {
            from { transform: scale(0.85) translateY(20px); opacity: 0; }
            to   { transform: scale(1) translateY(0); opacity: 1; }
        }
        .modal-close-btn {
            position: absolute; top: 14px; right: 14px;
            width: 36px; height: 36px; background: #f0f0f0; border: none;
            border-radius: 50%; font-size: 17px; cursor: pointer; transition: all 0.25s;
            display: flex; align-items: center; justify-content: center; color: #888;
        }
        .modal-close-btn:hover { background: var(--accent); color: white; }

        .modal-img-wrap {
            width: 180px; height: 180px; margin: 0 auto 12px; border-radius: 18px;
            overflow: hidden; border: 3px solid #f0e8e0; background: #fafafa; display: none;
        }
        .modal-img-wrap.has-img { display: block; }
        .modal-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .modal-hanzi { font-size: 130px; font-weight: 900; color: #222; line-height: 1; margin-bottom: 10px; text-shadow: 3px 4px 15px rgba(0,0,0,0.1); }
        .modal-pinyin { font-size: 26px; color: var(--primary); font-weight: 700; letter-spacing: 2px; margin-bottom: 10px; }
        .modal-meaning { font-size: 19px; color: #444; line-height: 1.6; margin-bottom: 6px; }
        .modal-example { font-size: 15px; color: #999; margin-bottom: 28px; }

        .modal-confirm-btn {
            padding: 13px 40px; background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 13px; font-size: 15px; font-weight: bold;
            cursor: pointer; transition: all 0.3s; box-shadow: 0 5px 18px rgba(255,107,107,0.32);
        }
        .modal-confirm-btn:hover { transform: scale(1.05); }

        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: rgba(0,0,0,0.78); color: white; padding: 11px 26px;
            border-radius: 11px; font-size: 14px; z-index: 9999; transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* 视图切换 */
        .view-toggle-btn {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #42a5f5, #478ed1);
            border: none; border-radius: 11px;
            color: white; font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s; flex-shrink: 0; margin-left: 10px;
        }
        .view-toggle-btn:hover { transform: scale(1.06); }

        /* 单字识字卡视图 */
        .cards-grid.single-mode {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 24px;
            min-height: 560px;
        }
        .single-card-wrap {
            flex: 1;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .single-card {
            background: rgba(255,255,255,0.97);
            border-radius: 28px;
            padding: 80px 60px 60px;
            text-align: center;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            width: 100%;
            position: relative;
            overflow: hidden;
            transition: all 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .single-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0;
            height: 5px; background: linear-gradient(90deg, #FF8C42, #FFD166, #FF6B6B);
        }
        .single-hanzi {
            font-size: 220px; font-weight: 900; color: #222;
            line-height: 1; margin-bottom: 20px;
            text-shadow: 3px 4px 15px rgba(0,0,0,0.1);
        }
        .single-pinyin {
            font-size: 48px; color: var(--primary); font-weight: 700;
            letter-spacing: 2px; margin-bottom: 20px;
        }
        .single-meaning {
            font-size: 28px; color: #555; line-height: 1.6; margin-bottom: 10px;
        }
        .single-example {
            font-size: 20px; color: #aaa; margin-bottom: 10px;
        }
        .single-counter {
            margin-top: 22px;
            font-size: 15px; color: rgba(255,255,255,0.9); font-weight: 500;
        }
        .single-counter strong { color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.15); }

        /* 左右导航按钮 */
        .nav-btn {
            width: 64px; height: 64px;
            background: rgba(255,255,255,0.95);
            border: none; border-radius: 50%;
            color: var(--primary); font-size: 24px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transition: all 0.25s; flex-shrink: 0;
        }
        .nav-btn:hover:not(:disabled) {
            transform: scale(1.1);
            background: white;
            color: var(--accent);
        }
        .nav-btn:disabled {
            opacity: 0.35; cursor: not-allowed;
        }

        /* 响应式 */
        @media (max-width: 1440px) {
            .cards-grid { gap: 16px; }
            .card-hanzi { font-size: 80px; }
            .card-img-wrap { width: 90px; height: 90px; }
        }
        @media (max-width: 1100px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 14px; }
            .card-hanzi { font-size: 74px; }
            .hanzi-card { padding: 24px 12px 18px; }
        }
        @media (max-width: 900px) {
            .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 12px; }
            .card-hanzi { font-size: 64px; }
            .card-pinyin { font-size: 18px; }
            .card-img-wrap { width: 78px; height: 78px; }
        }
        @media (max-width: 700px) {
            body { padding: 10px; }
            .header { flex-wrap: wrap; gap: 10px; padding: 12px 16px; margin-bottom: 12px; border-radius: 14px; }
            .search-box { order: 3; width: 100%; flex: none; }
            .title { font-size: 18px; }
            .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            .card-hanzi { font-size: 56px; }
            .hanzi-card { padding: 20px 10px 14px; border-radius: 16px; }
            .pagination-bar { padding: 10px 14px; border-radius: 14px; }
            .page-btn { min-width: 34px; height: 34px; font-size: 12px; }
            .page-jump { margin-left: 0; margin-top: 6px; width: 100%; justify-content: center; }
            .single-hanzi { font-size: 130px; }
            .single-pinyin { font-size: 30px; }
            .single-meaning { font-size: 20px; }
            .nav-btn { width: 48px; height: 48px; font-size: 18px; }
            .cards-grid.single-mode { gap: 12px; min-height: 380px; }
            .single-card { padding: 40px 24px 30px; border-radius: 22px; }
        }
        @media (max-width: 480px) {
            .cards-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .hanzi-card { padding: 16px 8px 12px; border-radius: 14px; }
            .card-hanzi { font-size: 48px; }
            .card-pinyin { font-size: 15px; }
            .card-meaning { font-size: 13px; }
            .card-img-wrap { width: 64px; height: 64px; border-radius: 12px; }
            .single-hanzi { font-size: 100px; }
            .single-pinyin { font-size: 24px; }
            .single-meaning { font-size: 18px; }
            .single-card { padding: 30px 16px 20px; border-radius: 20px; }
            .nav-btn { width: 40px; height: 40px; font-size: 16px; }
        }

        /* 语言切换按钮 */
        .lang-toggle-btn {
            width: 42px; height: 42px;
            background: linear-gradient(135deg, #118AB2, #06D6A0);
            border: none; border-radius: 11px;
            color: white; font-size: 14px; font-weight: bold;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.25s; flex-shrink: 0;
        }
        .lang-toggle-btn:hover { transform: scale(1.06); }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <div class="title">汉字卡片</div>
            <div class="search-box">
                <i class="fas fa-search search-icon"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索汉字、拼音或含义...">
                <button class="search-btn" onclick="doSearch()">搜索</button>
            </div>
            <button class="view-toggle-btn" id="viewToggleBtn" onclick="toggleViewMode()" title="切换单字/网格视图">
                <i class="fas fa-id-card" id="viewToggleIcon"></i>
            </button>
            <button class="lang-toggle-btn" id="langToggleBtn" onclick="toggleLanguage()" title="切换语言">
                <span id="langFlag">中</span>
            </button>
        </div>

        <!-- 统计栏 -->
        <div class="stats-bar" id="statsBar" style="display:none;">
            <span class="stats-text"><span id="statPageLabel">当前第</span> <strong id="statPage">1</strong> <span id="statPageUnit">页</span></span>
            <span class="stats-text"><span id="statTotalLabel">共</span> <strong id="statTotal">0</strong> <span id="statHanziUnit">个汉字</span></span>
        </div>

        <!-- 卡片区域 -->
        <div class="cards-grid" id="cardsGrid">
            <div class="loading"><div class="loading-spinner"></div><div style="color:#888;font-size:15px;">加载中...</div></div>
        </div>

        <!-- 分页 -->
        <div class="pagination-bar" id="pagination"></div>
    </div>

    <!-- 详情弹窗 -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal-card" onclick="event.stopPropagation()">
            <button class="modal-close-btn" onclick="closeModal(event)"><i class="fas fa-times"></i></button>
            <div class="modal-img-wrap" id="modalImgWrap"><img id="modalImg" src="" alt=""></div>
            <div class="modal-hanzi" id="modalHanzi"></div>
            <div class="modal-pinyin" id="modalPinyin"></div>
            <div class="modal-meaning" id="modalMeaning"></div>
            <div class="modal-example" id="modalExample"></div>
            <button class="modal-confirm-btn" onclick="closeModal(event)">关闭</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
    (function() {
        var API_BASE = '/api/admin/hanzi';
        var PAGE_SIZE = 12;

        // ---- 多语言支持 ----
        var _hcLang = localStorage.getItem('language') || 'zh';
        var _hcI18n = {
            zh: {
                title: '汉字卡片',
                searchPlaceholder: '搜索汉字、拼音或含义...',
                searchBtn: '搜索',
                loading: '加载中...',
                emptyNoMatch: '没有找到匹配的汉字',
                emptyNoData: '暂无汉字数据',
                page: '当前第',
                total: '共',
                hanzi: '个汉字',
                prev: '上一页',
                next: '下一页',
                jumpPage: '跳转',
                pageOf: '第',
                pageSlash: '/',
                page: '页',
                gridView: '网格视图',
                singleView: '单字视图',
                close: '关闭',
                prevStroke: '上一笔',
                nextStroke: '下一笔',
                strokeAnimation: '笔画动画',
                groupWord: '组词：'
            },
            en: {
                title: 'Hanzi Cards',
                searchPlaceholder: 'Search hanzi, pinyin or meaning...',
                searchBtn: 'Search',
                loading: 'Loading...',
                emptyNoMatch: 'No matching hanzi found',
                emptyNoData: 'No hanzi data available',
                page: 'Page',
                total: 'of',
                hanzi: 'hanzi',
                prev: 'Prev',
                next: 'Next',
                jumpPage: 'Jump',
                pageOf: 'Page',
                pageSlash: '/',
                page: '',
                gridView: 'Grid View',
                singleView: 'Single View',
                close: 'Close',
                prevStroke: 'Prev Stroke',
                nextStroke: 'Next Stroke',
                strokeAnimation: 'Stroke Animation',
                groupWord: 'Word: '
            }
        };

        function L(key) {
            return _hcI18n[_hcLang][key] || key;
        }

        function initLang() {
            var flag = document.getElementById('langFlag');
            if (flag) flag.textContent = _hcLang === 'zh' ? '中' : 'EN';
            document.title = L('title');
            document.querySelector('.title').textContent = L('title');
            document.getElementById('searchInput').placeholder = L('searchPlaceholder');
            document.querySelector('.search-btn').textContent = L('searchBtn');
        }

        window.toggleLanguage = function() {
            _hcLang = _hcLang === 'zh' ? 'en' : 'zh';
            localStorage.setItem('language', _hcLang);
            initLang();
            showToast(_hcLang === 'zh' ? '已切换到中文' : 'Switched to English');
        };

        // ---- 状态（全部用 window 级别确保全局可访问）----
        window._hcState = {
            currentPage: 0,
            totalPages: 1,
            totalElements: 0,
            keyword: '',
            cardsData: [],
            viewMode: 'grid',
            singleIndex: 0,
            pendingSingleIndex: null
        };

        function S() { return window._hcState; }

        /* ===== 工具函数 ===== */
        function escHtml(s) {
            var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML;
        }
        function escAttr(s) {
            return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function showToast(msg) {
            var el = document.getElementById('toast');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(function() { el.classList.remove('show'); }, 2500);
        }

        /* ===== 语音朗读 ===== */
        function speak(text) {
            if (!text || !window.speechSynthesis) return;
            window.speechSynthesis.cancel();
            var utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'zh-CN';
            utter.rate = 0.6;
            utter.pitch = 1.1;
            utter.volume = 1.0;
            window.speechSynthesis.speak(utter);
        }
        window.goBack = function() { window.location.href = 'index.html'; };

        window.doSearch = function () {
            S().keyword = (document.getElementById('searchInput').value || '').trim();
            S().currentPage = 0;
            loadCards();
        }

        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') doSearch();
        });

        /* ===== 数据加载 ===== */
        async function loadCards() {
            var state = S();
            var grid = document.getElementById('cardsGrid');
            grid.innerHTML = '<div class="loading"><div class="loading-spinner"></div><div style="color:#888;font-size:15px;">加载中...</div></div>';

            try {
                var qs = 'page=' + state.currentPage + '&size=' + PAGE_SIZE;
                if (state.keyword) qs += '&keyword=' + encodeURIComponent(state.keyword);

                var res = await fetch(API_BASE + '/cards?' + qs);
                if (!res.ok) throw new Error('HTTP ' + res.status);

                var data = await res.json();

                // ---- 关键：强制解析数字 ----
                state.cardsData = Array.isArray(data.content) ? data.content : [];

                // 单字视图跨页定位
                if (state.pendingSingleIndex !== null) {
                    if (state.pendingSingleIndex === -1) {
                        state.singleIndex = state.cardsData.length - 1;
                    } else {
                        state.singleIndex = state.pendingSingleIndex;
                    }
                    state.pendingSingleIndex = null;
                }

                // totalElements
                var rawTotal = data.totalElements != null ? data.totalElements : (data.total != null ? data.total : 0);
                state.totalElements = Number(rawTotal) || 0;
                if (!state.totalElements && state.cardsData.length > 0) state.totalElements = state.cardsData.length;

                // totalPages —— 最关键的值
                var rawTp = data.totalPages != null ? data.totalPages : 0;
                state.totalPages = Number(rawTp) || 0;
                if (!state.totalPages && state.totalElements > 0) state.totalPages = Math.ceil(state.totalElements / PAGE_SIZE);
                if (!state.totalPages) state.totalPages = 1;

                console.log('[HanziCards] 数据加载完成:', {
                    totalPages: state.totalPages,
                    totalElements: state.totalElements,
                    currentPage: state.currentPage,
                    cardsCount: state.cardsData.length,
                    rawApi_totalPages: rawTp,
                    rawApi_totalElements: rawTotal
                });

                renderAll();
            } catch (err) {
                console.error('[HanziCards] 加载失败:', err);
                grid.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128533;</div><div class="empty-text">加载失败，请重试</div></div>';
            }
        }

        /* ===== 统一渲染 ===== */
        function renderAll() {
            renderStats();
            renderCards();
            renderPagination();
        }

        function renderStats() {
            var state = S();
            var bar = document.getElementById('statsBar');
            if (state.cardsData && state.cardsData.length > 0) {
                bar.style.display = 'flex';
                document.getElementById('statPage').textContent = state.currentPage + 1;
                document.getElementById('statTotal').textContent = state.totalElements;
                document.getElementById('statPageLabel').textContent = L('page');
                document.getElementById('statPageUnit').textContent = L('page');
                document.getElementById('statTotalLabel').textContent = L('total');
                document.getElementById('statHanziUnit').textContent = L('hanzi');
            } else {
                bar.style.display = 'none';
            }
        }

        /* ===== 卡片 ===== */
        function renderCards() {
            var state = S();
            var grid = document.getElementById('cardsGrid');

            if (state.viewMode === 'single') {
                grid.className = 'cards-grid single-mode';
                renderSingleCard(grid);
                return;
            } else {
                grid.className = 'cards-grid';
            }

            if (!state.cardsData || !state.cardsData.length) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128230;</div><div class="empty-text">' +
                    (state.keyword ? '没有找到匹配的汉字' : '暂无汉字数据') + '</div></div>';
                return;
            }

            var parts = [];
            for (var i = 0; i < state.cardsData.length; i++) {
                var c = state.cardsData[i];
                var url = c.imageUrl || c.image_url || '';
                var img = url ? '<div class="card-img-wrap has-img"><img src="' + escAttr(url) + '" onerror="this.parentElement.style.display=\'none\'"></div>' : '';

                parts.push(
                    '<div class="hanzi-card" onclick="showDetail(' + c.id + ')">',
                    img,
                    '<div class="card-hanzi">', escHtml(c.hanzi), '</div>',
                    '<div class="card-pinyin">', escHtml(c.pinyin), '</div>',
                    '<div class="card-meaning">', escHtml(c.meaning || ''), '</div>',
                    c.exampleWord ? '<div class="card-example">' + escHtml(c.exampleWord) + '</div>' : '',
                    '</div>'
                );
            }
            grid.innerHTML = parts.join('');
        }

        function renderSingleCard(grid) {
            var state = S();
            var data = state.cardsData || [];

            if (!data.length) {
                grid.innerHTML = '<div class="empty-state"><div class="empty-icon">&#128230;</div><div class="empty-text">' +
                    (state.keyword ? '没有找到匹配的汉字' : '暂无汉字数据') + '</div></div>';
                return;
            }

            var idx = state.singleIndex || 0;
            if (idx >= data.length) idx = 0;
            var c = data[idx];

            var url = c.imageUrl || c.image_url || '';
            var imgStyle = 'width:220px;height:220px;margin:0 auto 20px;border-radius:18px;';
            var img = url ? '<div class="card-img-wrap has-img" style="' + imgStyle + '"><img src="' + escAttr(url) + '" onerror="this.parentElement.style.display=\'none\'"></div>' : '';

            var globalIndex = state.currentPage * PAGE_SIZE + idx + 1;
            var total = state.totalElements;
            var isFirst = state.currentPage === 0 && idx === 0;
            var isLast = state.currentPage >= state.totalPages - 1 && idx >= data.length - 1;

            var html = [
                '<button class="nav-btn" onclick="prevSingle()"' + (isFirst ? ' disabled' : '') + '><i class="fas fa-chevron-left"></i></button>',
                '<div class="single-card-wrap">',
                '  <div class="single-card" onclick="speakSingle()" title="点击朗读">',
                img,
                '    <div class="single-hanzi">', escHtml(c.hanzi), '</div>',
                '    <div class="single-pinyin">', escHtml(c.pinyin), '</div>',
                '    <div class="single-meaning">', escHtml(c.meaning || ''), '</div>',
                c.exampleWord ? '<div class="single-example">组词：' + escHtml(c.exampleWord) + '</div>' : '',
                '  </div>',
                '  <div class="single-counter">第 <strong>', globalIndex, '</strong> / <strong>', total, '</strong> 个</div>',
                '</div>',
                '<button class="nav-btn" onclick="nextSingle()"' + (isLast ? ' disabled' : '') + '><i class="fas fa-chevron-right"></i></button>'
            ].join('');

            grid.innerHTML = html;
        }

        /* ===== 分页（核心）====== */
        function renderPagination() {
            var state = S();
            var bar = document.getElementById('pagination');

            // 强制转为数字
            var tp = Number(state.totalPages) || 1;
            var cp = Number(state.currentPage) || 0;
            var te = Number(state.totalElements) || 0;

            var parts = [];

            // --- [上一页] 始终显示 ---
            parts.push(
                '<button class="page-btn"', (cp <= 0 ? ' disabled' : ''),
                ' onclick="doGoPage(', (cp - 1), ')">',
                '<i class="fas fa-chevron-left"></i></button>'
            );

            // --- 页码按钮 ---
            if (tp <= 10) {
                // 少于等于10页：全部展开
                for (var n = 0; n < tp; n++) {
                    parts.push(
                        '<button class="page-btn"', (n === cp ? ' active' : ''),
                        ' onclick="doGoPage(', n, ')">', (n + 1), '</button>'
                    );
                }
            } else {
                // 多于10页：省略模式
                var showMax = 7;
                var start = Math.max(0, cp - Math.floor(showMax / 2));
                var end = Math.min(tp - 1, start + showMax - 1);
                if (end - start < showMax - 1) start = Math.max(0, end - showMax + 1);

                // 首页
                if (start > 0) {
                    parts.push('<button class="page-btn" onclick="doGoPage(0)">1</button>');
                    if (start > 1) parts.push('<span class="page-dots">···</span>');
                }

                // 中间页码
                for (var j = start; j <= end; j++) {
                    parts.push(
                        '<button class="page-btn"', (j === cp ? ' active' : ''),
                        ' onclick="doGoPage(', j, ')">', (j + 1), '</button>'
                    );
                }

                // 末页
                if (end < tp - 1) {
                    if (end < tp - 2) parts.push('<span class="page-dots">···</span>');
                    parts.push('<button class="page-btn" onclick="doGoPage(', (tp - 1), ')">', tp, '</button>');
                }
            }

            // --- [下一页] 始终显示 ---
            parts.push(
                '<button class="page-btn"', (cp >= tp - 1 ? ' disabled' : ''),
                ' onclick="doGoPage(', (cp + 1), ')">',
                '<i class="fas fa-chevron-right"></i></button>'
            );

            // --- 跳转 ---
            parts.push(
                '<span class="page-jump">',
                '到第 <input type="number" class="page-jump-input" id="jumpInput" min="1" max="', tp, '" onkeydown="if(event.key===\'Enter\')doJumpPage()"> ',
                L('page') === 'Page' ? 'page ' : '页 ',
                '<button class="page-jump-btn" onclick="doJumpPage()">' + L('jumpPage') + '</button>',
                '</span>'
            );

            // --- 统计文字 ---
            parts.push('<span class="page-info">' + L('pageOf') + ' ', (cp + 1), ' ' + L('pageSlash') + ' ', tp, ' ' + L('page') + ' &nbsp;·&nbsp; ' + L('total') + ' ', te, ' ' + L('hanzi') + '</span>');

            bar.innerHTML = parts.join('');
        }

        /* ===== 翻页（全局函数供 onclick 调用）===== */
        window.doGoPage = function(targetPage) {
            var tp = Number(S().totalPages) || 1;
            if (targetPage < 0 || targetPage >= tp) return;
            S().currentPage = targetPage;
            if (S().viewMode === 'single' && S().pendingSingleIndex === null) {
                S().singleIndex = 0;
            }
            loadCards();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        /* ===== 视图切换 & 单字识字卡导航 ===== */
        window.toggleViewMode = function() {
            var state = S();
            state.viewMode = state.viewMode === 'grid' ? 'single' : 'grid';
            var icon = document.getElementById('viewToggleIcon');
            if (icon) icon.className = state.viewMode === 'grid' ? 'fas fa-id-card' : 'fas fa-th';
            if (state.viewMode === 'single') {
                state.singleIndex = 0;
            }
            renderAll();
        };

        window.speakSingle = function() {
            var state = S();
            var data = state.cardsData || [];
            var idx = state.singleIndex || 0;
            if (idx >= data.length) idx = 0;
            var c = data[idx];
            // + '，' + c.pinyin
            if (c) speak(c.hanzi + '，' + c.exampleWord);
        };

        window.prevSingle = function() {
            var state = S();
            if (state.singleIndex > 0) {
                state.singleIndex--;
                renderCards();
            } else if (state.currentPage > 0) {
                state.pendingSingleIndex = -1;
                doGoPage(state.currentPage - 1);
            }
        };

        window.nextSingle = function() {
            var state = S();
            var data = state.cardsData || [];
            if (state.singleIndex < data.length - 1) {
                state.singleIndex++;
                renderCards();
            } else if (state.currentPage < state.totalPages - 1) {
                state.pendingSingleIndex = 0;
                doGoPage(state.currentPage + 1);
            }
        };

        window.doJumpPage = function() {
            var input = document.getElementById('jumpInput');
            if (!input) return;
            var val = parseInt(input.value, 10);
            var tp = Number(S().totalPages) || 1;
            if (!val || val < 1 || val > tp) {
                showToast('请输入 1~' + tp + ' 的有效页码');
                return;
            }
            doGoPage(val - 1);
        };

        /* ===== 详情弹窗 ===== */
        window.showDetail = function(id) {
            var cards = S().cardsData || [];
            var card = null;
            for (var k = 0; k < cards.length; k++) {
                if (cards[k].id === id) { card = cards[k]; break; }
            }
            if (!card) return;

            var wrap = document.getElementById('modalImgWrap');
            var imgUrl = card.imageUrl || card.image_url || '';
            if (imgUrl) {
                wrap.className = 'modal-img-wrap has-img';
                wrap.style.display = 'block';
                var mi = document.getElementById('modalImg');
                mi.src = imgUrl;
                mi.onerror = function() { wrap.style.display = 'none'; };
            } else {
                wrap.style.display = 'none';
                wrap.className = 'modal-img-wrap';
            }

            document.getElementById('modalHanzi').textContent = card.hanzi;
            document.getElementById('modalPinyin').textContent = card.pinyin;
            document.getElementById('modalMeaning').textContent = card.meaning || '';
            document.getElementById('modalExample').textContent = card.exampleWord ? '组词：' + card.exampleWord : '';
            document.getElementById('modalOverlay').classList.add('active');
            //+ '，' + card.pinyin
            speak(card.hanzi+ '，' + card.exampleWord);
        };

        window.closeModal = function(ev) {
            ev && ev.stopPropagation();
            document.getElementById('modalOverlay').classList.remove('active');
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') window.closeModal();
            if (S().viewMode === 'single') {
                if (e.key === 'ArrowLeft') { e.preventDefault(); prevSingle(); }
                if (e.key === 'ArrowRight') { e.preventDefault(); nextSingle(); }
            }
        });

        // ---- 启动加载 ----
        initLang();
        loadCards();
    })();
    </script>
</body>
</html>
